<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>食見生活 7月拉霸機</title>
<script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: #0a0a0f;
  min-height: 100vh;
  color: #fff;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(212,175,55,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(212,175,55,0.05) 0%, transparent 50%),
    #0a0a0f;
  z-index: 0;
}

.page { position: relative; z-index: 1; }

/* 頁籤導航 */
.tabs {
  display: flex;
  padding: 16px 20px 0;
  gap: 8px;
  max-width: 400px;
  margin: 0 auto;
}

.tab-btn {
  flex: 1;
  padding: 10px;
  background: rgba(212,175,55,0.05);
  border: 0.5px solid rgba(212,175,55,0.2);
  border-radius: 12px;
  color: rgba(212,175,55,0.5);
  font-size: 13px;
  font-family: 'Noto Sans TC', sans-serif;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 1px;
}

.tab-btn.active {
  background: rgba(212,175,55,0.15);
  border-color: rgba(212,175,55,0.5);
  color: #d4af37;
}

/* ========== 拉霸機頁面 ========== */
#page-slot { display: block; }
#page-coupons { display: none; }

.header {
  text-align: center;
  padding: 20px 20px 0;
}

.brand-badge {
  display: inline-block;
  background: linear-gradient(135deg, #d4af37, #f5d06b, #d4af37);
  color: #1a1200;
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 2px;
  padding: 4px 14px;
  border-radius: 20px;
  margin-bottom: 10px;
}

.header h1 {
  font-size: 24px;
  font-weight: 900;
  background: linear-gradient(135deg, #f5d06b, #d4af37, #f5d06b);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 1px;
  margin-bottom: 4px;
}

.header p { font-size: 12px; color: rgba(212,175,55,0.4); letter-spacing: 1px; }

.machine-wrap { padding: 20px 20px 0; display: flex; justify-content: center; }

.machine {
  width: 100%;
  max-width: 340px;
  background: linear-gradient(160deg, #1c1608, #0d0a02);
  border: 1.5px solid rgba(212,175,55,0.35);
  border-radius: 24px;
  padding: 22px 18px 18px;
  position: relative;
  box-shadow: 0 0 0 1px rgba(212,175,55,0.1), 0 0 40px rgba(212,175,55,0.08), inset 0 1px 0 rgba(212,175,55,0.2);
}

.machine::before {
  content: '';
  position: absolute;
  top: -1px; left: 30px; right: 30px;
  height: 2px;
  background: linear-gradient(90deg, transparent, #d4af37, #f5d06b, #d4af37, transparent);
}

.reels-container { display: flex; gap: 8px; margin-bottom: 18px; position: relative; }

.reel {
  flex: 1; height: 96px;
  background: #04030a;
  border: 1.5px solid rgba(212,175,55,0.25);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; position: relative;
  box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
}

.reel::before, .reel::after {
  content: ''; position: absolute; left: 0; right: 0; height: 28px; z-index: 2; pointer-events: none;
}
.reel::before { top: 0; background: linear-gradient(to bottom, #04030a, transparent); }
.reel::after { bottom: 0; background: linear-gradient(to top, #04030a, transparent); }

.reel-symbol { font-size: 44px; line-height: 1; position: relative; z-index: 1; transition: transform 0.1s; }
.reel.spinning .reel-symbol { animation: reelSpin 0.08s linear infinite; }

@keyframes reelSpin {
  0% { transform: translateY(-8px) scale(0.9); opacity: 0.6; }
  50% { transform: translateY(0) scale(1.05); opacity: 1; }
  100% { transform: translateY(8px) scale(0.9); opacity: 0.6; }
}

.pull-btn {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, #c9950a, #d4af37, #f5d06b, #d4af37, #c9950a);
  border: none; border-radius: 14px;
  color: #1a0f00; font-size: 16px; font-weight: 900;
  font-family: 'Noto Sans TC', sans-serif; letter-spacing: 2px; cursor: pointer;
  box-shadow: 0 4px 20px rgba(212,175,55,0.35), 0 1px 0 rgba(255,255,255,0.2) inset;
  transition: transform 0.1s, box-shadow 0.1s;
  position: relative; overflow: hidden;
}
.pull-btn:not(:disabled):active { transform: translateY(2px); box-shadow: 0 2px 10px rgba(212,175,55,0.2); }
.pull-btn:disabled { background: linear-gradient(135deg, #3a3020, #2a2010); color: rgba(212,175,55,0.3); cursor: not-allowed; box-shadow: none; }

.tries-info { text-align: center; margin-top: 10px; font-size: 12px; color: rgba(212,175,55,0.4); letter-spacing: 1px; }

.prizes-wrap { padding: 18px 20px 8px; display: flex; justify-content: center; }

.prizes { width: 100%; max-width: 340px; }

.prizes-title { font-size: 11px; color: rgba(212,175,55,0.4); letter-spacing: 2px; text-align: center; margin-bottom: 8px; }

.prize-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 12px; margin-bottom: 4px;
  background: rgba(212,175,55,0.05); border: 0.5px solid rgba(212,175,55,0.1); border-radius: 10px;
}
.prize-rank { font-size: 13px; font-weight: 700; color: #d4af37; min-width: 26px; }
.prize-name { font-size: 12px; color: rgba(255,255,255,0.7); flex: 1; padding: 0 8px; }
.prize-rate { font-size: 11px; color: rgba(212,175,55,0.35); min-width: 28px; text-align: right; }
.no-prize .prize-rank, .no-prize .prize-name { color: rgba(255,255,255,0.2); }

.footer { text-align: center; padding: 14px 20px 28px; font-size: 11px; color: rgba(212,175,55,0.15); letter-spacing: 1px; }

/* ========== 中獎結果彈窗 ========== */
.result-overlay {
  display: none; padding: 20px;
  justify-content: center;
}
.result-overlay.show { display: flex; }

.result-card {
  width: 100%; max-width: 340px;
  background: linear-gradient(160deg, #1c1608, #0d0a02);
  border: 1.5px solid rgba(212,175,55,0.4);
  border-radius: 24px; padding: 28px 22px; text-align: center;
  box-shadow: 0 0 0 1px rgba(212,175,55,0.1), 0 0 40px rgba(212,175,55,0.1);
  animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
}

@keyframes popIn { 0% { transform: scale(0.7); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

.result-emoji { font-size: 56px; margin-bottom: 12px; display: block; }
.result-title {
  font-size: 20px; font-weight: 900;
  background: linear-gradient(135deg, #f5d06b, #d4af37);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  margin-bottom: 8px; letter-spacing: 1px;
}
.result-prize { font-size: 15px; color: rgba(255,255,255,0.85); margin-bottom: 6px; line-height: 1.6; }
.result-note { font-size: 12px; color: rgba(212,175,55,0.4); margin-bottom: 20px; line-height: 1.6; }

.result-btn {
  width: 100%; padding: 13px;
  background: linear-gradient(135deg, #c9950a, #d4af37, #f5d06b, #d4af37, #c9950a);
  border: none; border-radius: 12px;
  color: #1a0f00; font-size: 15px; font-weight: 900;
  font-family: 'Noto Sans TC', sans-serif; cursor: pointer; letter-spacing: 1px;
}

/* ========== 優惠券列表頁面 ========== */
.coupons-header {
  text-align: center;
  padding: 20px 20px 4px;
}
.coupons-header h2 {
  font-size: 20px; font-weight: 900;
  background: linear-gradient(135deg, #f5d06b, #d4af37);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  letter-spacing: 1px; margin-bottom: 4px;
}
.coupons-header p { font-size: 12px; color: rgba(212,175,55,0.4); }

.coupons-list { padding: 16px 20px 32px; display: flex; flex-direction: column; align-items: center; gap: 12px; }

/* 優惠券卡片 */
.coupon-card {
  width: 100%; max-width: 340px;
  background: linear-gradient(135deg, #1c1608, #0d0a02);
  border: 1.5px solid rgba(212,175,55,0.35);
  border-radius: 18px; overflow: hidden;
  position: relative;
  box-shadow: 0 0 0 1px rgba(212,175,55,0.08);
  transition: transform 0.2s;
}

.coupon-card.used {
  border-color: rgba(255,255,255,0.08);
  filter: grayscale(0.8);
}

/* 已使用蓋章 */
.used-stamp {
  display: none;
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) rotate(-15deg);
  font-size: 36px; font-weight: 900;
  color: rgba(255,60,60,0.6);
  border: 4px solid rgba(255,60,60,0.5);
  padding: 6px 14px; border-radius: 8px;
  letter-spacing: 2px; white-space: nowrap;
  z-index: 10;
  text-shadow: 0 0 10px rgba(255,60,60,0.3);
}
.coupon-card.used .used-stamp { display: block; }

.coupon-top {
  padding: 16px 18px 12px;
  border-bottom: 1px dashed rgba(212,175,55,0.2);
}

.coupon-rank { font-size: 12px; color: rgba(212,175,55,0.5); letter-spacing: 1px; margin-bottom: 4px; }
.coupon-prize { font-size: 17px; font-weight: 900; color: #f5d06b; margin-bottom: 2px; }
.coupon-date { font-size: 11px; color: rgba(255,255,255,0.3); }

.coupon-bottom {
  padding: 10px 18px;
  display: flex; align-items: center; justify-content: space-between;
}

.coupon-expire { font-size: 11px; color: rgba(212,175,55,0.35); }

.use-btn {
  padding: 8px 18px;
  background: linear-gradient(135deg, #c9950a, #d4af37);
  border: none; border-radius: 10px;
  color: #1a0f00; font-size: 13px; font-weight: 900;
  font-family: 'Noto Sans TC', sans-serif; cursor: pointer; letter-spacing: 1px;
}
.use-btn:disabled { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.2); cursor: not-allowed; }

.empty-coupons {
  text-align: center; padding: 60px 20px;
  color: rgba(212,175,55,0.25); font-size: 14px; letter-spacing: 1px;
}

/* ========== 核銷彈窗 ========== */
.redeem-modal-wrap {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 200;
  align-items: center; justify-content: center;
  padding: 20px;
}
.redeem-modal-wrap.show { display: flex; }

.redeem-modal {
  width: 100%; max-width: 320px;
  background: linear-gradient(160deg, #1c1608, #0d0a02);
  border: 1.5px solid rgba(212,175,55,0.4);
  border-radius: 20px; padding: 28px 22px; text-align: center;
  animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
}

.redeem-modal h3 {
  font-size: 17px; font-weight: 900;
  background: linear-gradient(135deg, #f5d06b, #d4af37);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  margin-bottom: 6px; letter-spacing: 1px;
}
.redeem-modal p { font-size: 12px; color: rgba(212,175,55,0.4); margin-bottom: 18px; }

.redeem-input {
  width: 100%; padding: 14px;
  background: rgba(0,0,0,0.5);
  border: 1.5px solid rgba(212,175,55,0.3);
  border-radius: 12px; color: #f5d06b;
  font-size: 22px; font-weight: 900; font-family: 'Noto Sans TC', sans-serif;
  text-align: center; letter-spacing: 6px; margin-bottom: 12px;
  outline: none;
}
.redeem-input:focus { border-color: rgba(212,175,55,0.7); }

.redeem-error { font-size: 12px; color: #ff6b6b; margin-bottom: 10px; min-height: 18px; }

.redeem-btns { display: flex; gap: 8px; }

.redeem-cancel {
  flex: 1; padding: 12px;
  background: rgba(255,255,255,0.05);
  border: 0.5px solid rgba(255,255,255,0.1);
  border-radius: 10px; color: rgba(255,255,255,0.4);
  font-size: 14px; font-family: 'Noto Sans TC', sans-serif; cursor: pointer;
}

.redeem-confirm {
  flex: 2; padding: 12px;
  background: linear-gradient(135deg, #c9950a, #d4af37);
  border: none; border-radius: 10px;
  color: #1a0f00; font-size: 14px; font-weight: 900;
  font-family: 'Noto Sans TC', sans-serif; cursor: pointer; letter-spacing: 1px;
}

/* loading */
.loading { text-align: center; padding: 80px 20px; color: rgba(212,175,55,0.4); font-size: 14px; letter-spacing: 1px; }
.loading-dot { display: inline-block; animation: blink 1.2s infinite; }
.loading-dot:nth-child(2) { animation-delay: 0.2s; }
.loading-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%,80%,100% { opacity: 0.2; } 40% { opacity: 1; } }

/* 彩帶 */
.confetti-wrap { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; display: none; }
.confetti-wrap.active { display: block; }
</style>
</head>
<body>
<div class="page">
  <div id="loading" class="loading">
    <p>載入中<span class="loading-dot">．</span><span class="loading-dot">．</span><span class="loading-dot">．</span></p>
  </div>

  <div id="main" style="display:none">
    <!-- 頁籤 -->
    <div class="tabs">
      <button class="tab-btn active" id="tab-slot" onclick="switchTab('slot')">🎰 拉霸機</button>
      <button class="tab-btn" id="tab-coupons" onclick="switchTab('coupons')">🎫 我的優惠券</button>
    </div>

    <!-- 拉霸機頁面 -->
    <div id="page-slot">
      <div class="header">
        <div class="brand-badge">🗓 7月限定活動</div>
        <h1>🎰 食見生活拉霸機</h1>
        <p>彰化民族分店 · 每日一次 · 會員限定</p>
      </div>

      <div class="machine-wrap">
        <div class="machine">
          <div class="reels-container">
            <div class="reel" id="reel1"><div class="reel-symbol" id="sym1">🍱</div></div>
            <div class="reel" id="reel2"><div class="reel-symbol" id="sym2">🥗</div></div>
            <div class="reel" id="reel3"><div class="reel-symbol" id="sym3">🍳</div></div>
          </div>
          <button class="pull-btn" id="pullBtn" onclick="pullSlot()">🎰 開始轉動！</button>
          <div class="tries-info" id="triesInfo">今日剩餘次數：1 次</div>
        </div>
      </div>

      <!-- 中獎結果 -->
      <div class="result-overlay" id="resultOverlay">
        <div class="result-card">
          <span class="result-emoji" id="resultEmoji">🎉</span>
          <div class="result-title" id="resultTitle">恭喜中獎！</div>
          <div class="result-prize" id="resultPrize"></div>
          <div class="result-note" id="resultNote"></div>
          <button class="result-btn" onclick="closeResult()">收下優惠券 🎫</button>
        </div>
      </div>

      <div class="prizes-wrap">
        <div class="prizes">
          <div class="prizes-title">✦ 獎項列表 ✦</div>
          <div class="prize-item"><span class="prize-rank">🥇</span><span class="prize-name">頭獎｜200元購物金</span><span class="prize-rate">2%</span></div>
          <div class="prize-item"><span class="prize-rank">🥈</span><span class="prize-name">二獎｜任意主餐同事分享</span><span class="prize-rate">5%</span></div>
          <div class="prize-item"><span class="prize-rank">🥉</span><span class="prize-name">三獎｜第二個便當半價</span><span class="prize-rate">8%</span></div>
          <div class="prize-item"><span class="prize-rank">🎖</span><span class="prize-name">四獎｜第二個便當折20元</span><span class="prize-rate">15%</span></div>
          <div class="prize-item"><span class="prize-rank">🎁</span><span class="prize-name">五獎｜任意餐盒折抵10元</span><span class="prize-rate">20%</span></div>
          <div class="prize-item no-prize"><span class="prize-rank">😢</span><span class="prize-name">迷有中獎 Q_Q</span><span class="prize-rate">50%</span></div>
        </div>
      </div>
      <div class="footer">食見生活 © 2026 · 活動至7月31日止</div>
    </div>

    <!-- 優惠券頁面 -->
    <div id="page-coupons" style="display:none">
      <div class="coupons-header">
        <h2>🎫 我的優惠券</h2>
        <p>點擊「使用」並請店員輸入核銷碼</p>
      </div>
      <div class="coupons-list" id="couponsList">
        <div class="empty-coupons">還沒有優惠券<br>快去抽拉霸機吧！</div>
      </div>
    </div>
  </div>
</div>

<!-- 核銷彈窗 -->
<div class="redeem-modal-wrap" id="redeemModal">
  <div class="redeem-modal">
    <h3>🔐 店員核銷</h3>
    <p>請請店員輸入核銷碼以使用此優惠券</p>
    <input type="password" class="redeem-input" id="redeemInput" placeholder="••••••" maxlength="6">
    <div class="redeem-error" id="redeemError"></div>
    <div class="redeem-btns">
      <button class="redeem-cancel" onclick="closeRedeemModal()">取消</button>
      <button class="redeem-confirm" onclick="confirmRedeem()">確認核銷</button>
    </div>
  </div>
</div>

<canvas id="confettiCanvas" class="confetti-wrap"></canvas>

<script>
const LIFF_ID = '2010668792-5uCuOlz3';
const API_BASE = 'https://line-unfollow-tracker.onrender.com';
const REDEEM_CODE = '700718';
const SYMBOLS = ['🍱','🥗','🍳','🥦','🍚','🍗','🥩','🍜','🥘'];
const PRIZES = [
  { id:1, name:'🥇 頭獎', desc:'200元購物金', prob:2, emoji:'🏆' },
  { id:2, name:'🥈 二獎', desc:'任意主餐同事分享', prob:5, emoji:'🎊' },
  { id:3, name:'🥉 三獎', desc:'第二個便當半價', prob:8, emoji:'🎉' },
  { id:4, name:'🎖 四獎', desc:'第二個便當折20元', prob:15, emoji:'😊' },
  { id:5, name:'🎁 五獎', desc:'任意餐盒折抵10元', prob:20, emoji:'😄' },
  { id:0, name:'😢 沒中獎', desc:'迷有中獎Q_Q\n下次再來試試吧！', prob:50, emoji:'😢' },
];

let userId = '';
let isSpinning = false;
let currentRedeemId = null;
let coupons = [];

// 從 localStorage 讀取優惠券（以 userId 為 key）
function loadCoupons() {
  if (!userId) return [];
  try {
    const data = localStorage.getItem('coupons_' + userId);
    return data ? JSON.parse(data) : [];
  } catch(e) { return []; }
}

function saveCoupons() {
  if (!userId) return;
  try { localStorage.setItem('coupons_' + userId, JSON.stringify(coupons)); } catch(e) {}
}

async function initLiff() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    const profile = await liff.getProfile();
    userId = profile.userId;
    coupons = loadCoupons();

    const res = await fetch(`${API_BASE}/slot/check?userId=${userId}`);
    const data = await res.json();

    document.getElementById('loading').style.display = 'none';
    document.getElementById('main').style.display = 'block';

    if (data.played) {
      document.getElementById('pullBtn').disabled = true;
      document.getElementById('pullBtn').textContent = '今日已使用 🎰';
      document.getElementById('triesInfo').textContent = '明天再來試試手氣！';
    }
  } catch(e) {
    document.getElementById('loading').innerHTML = '<p>載入失敗，請重新整理</p>';
  }
}

function switchTab(tab) {
  document.getElementById('page-slot').style.display = tab === 'slot' ? 'block' : 'none';
  document.getElementById('page-coupons').style.display = tab === 'coupons' ? 'block' : 'none';
  document.getElementById('tab-slot').classList.toggle('active', tab === 'slot');
  document.getElementById('tab-coupons').classList.toggle('active', tab === 'coupons');
  if (tab === 'coupons') renderCoupons();
}

function drawPrize() {
  const rand = Math.random() * 100;
  let cum = 0;
  for (const p of PRIZES) { cum += p.prob; if (rand < cum) return p; }
  return PRIZES[PRIZES.length-1];
}

function randomSymbol() { return SYMBOLS[Math.floor(Math.random()*SYMBOLS.length)]; }

async function pullSlot() {
  if (isSpinning) return;
  isSpinning = true;
  const btn = document.getElementById('pullBtn');
  btn.disabled = true;
  btn.textContent = '轉動中...';

  const prize = drawPrize();
  const won = prize.id !== 0;

  ['reel1','reel2','reel3'].forEach(id => document.getElementById(id).classList.add('spinning'));

  const stops = [1200, 1700, 2200];
  const symIds = ['sym1','sym2','sym3'];
  const reelIds = ['reel1','reel2','reel3'];
  let finalSym = randomSymbol();

  reelIds.forEach((rid, i) => {
    setTimeout(() => {
      document.getElementById(rid).classList.remove('spinning');
      if (won) {
        document.getElementById(symIds[i]).textContent = finalSym;
      } else {
        document.getElementById(symIds[i]).textContent = randomSymbol();
      }
    }, stops[i]);
  });

  setTimeout(async () => {
    try {
      await fetch(`${API_BASE}/slot/play`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ userId, prizeId: prize.id, prizeName: prize.name, prizeDesc: prize.desc })
      });
    } catch(e) {}

    if (won) {
      // 儲存優惠券到本地
      const coupon = {
        id: Date.now(),
        prizeId: prize.id,
        name: prize.name,
        desc: prize.desc,
        emoji: prize.emoji,
        wonAt: new Date().toLocaleDateString('zh-TW'),
        used: false
      };
      coupons.unshift(coupon);
      saveCoupons();
    }

    showResult(prize, won);
    isSpinning = false;
  }, 2500);
}

function showResult(prize, won) {
  document.getElementById('resultEmoji').textContent = prize.emoji;
  document.getElementById('resultTitle').textContent = won ? prize.name : '很遺憾...';
  document.getElementById('resultPrize').textContent = prize.desc;
  document.getElementById('resultNote').textContent = won
    ? '🎊 優惠券已存入「我的優惠券」！\n來店時請切換頁籤出示使用。'
    : '下次再來試試手氣吧～';

  const btn = document.querySelector('.result-btn');
  btn.textContent = won ? '收下優惠券 🎫' : '好的，下次再來';
  document.getElementById('resultOverlay').classList.add('show');
  document.getElementById('pullBtn').textContent = '今日已使用 🎰';
  document.getElementById('triesInfo').textContent = '明天再來試試手氣！';
  if (won) startConfetti();
}

function closeResult() {
  document.getElementById('resultOverlay').classList.remove('show');
  stopConfetti();
}

// ===== 優惠券列表 =====
function renderCoupons() {
  coupons = loadCoupons();
  const list = document.getElementById('couponsList');
  if (!coupons.length) {
    list.innerHTML = '<div class="empty-coupons">還沒有優惠券<br>快去抽拉霸機吧！🎰</div>';
    return;
  }
  list.innerHTML = coupons.map(c => `
    <div class="coupon-card ${c.used ? 'used' : ''}" id="coupon-${c.id}">
      <div class="used-stamp">已使用</div>
      <div class="coupon-top">
        <div class="coupon-rank">${c.name}</div>
        <div class="coupon-prize">${c.emoji} ${c.desc}</div>
        <div class="coupon-date">獲得日期：${c.wonAt}</div>
      </div>
      <div class="coupon-bottom">
        <div class="coupon-expire">有效期限：2026/07/31</div>
        <button class="use-btn" ${c.used ? 'disabled' : ''} onclick="openRedeemModal(${c.id})">
          ${c.used ? '已使用' : '使用'}
        </button>
      </div>
    </div>
  `).join('');
}

function openRedeemModal(couponId) {
  currentRedeemId = couponId;
  document.getElementById('redeemInput').value = '';
  document.getElementById('redeemError').textContent = '';
  document.getElementById('redeemModal').classList.add('show');
  setTimeout(() => document.getElementById('redeemInput').focus(), 100);
}

function closeRedeemModal() {
  document.getElementById('redeemModal').classList.remove('show');
  currentRedeemId = null;
}

function confirmRedeem() {
  const input = document.getElementById('redeemInput').value.trim();
  const errorEl = document.getElementById('redeemError');

  if (input !== REDEEM_CODE) {
    errorEl.textContent = '❌ 核銷碼錯誤，請重新輸入';
    document.getElementById('redeemInput').value = '';
    return;
  }

  // 標記為已使用
  const idx = coupons.findIndex(c => c.id === currentRedeemId);
  if (idx !== -1) {
    coupons[idx].used = true;
    saveCoupons();
  }

  closeRedeemModal();
  renderCoupons();
}

// ===== 彩帶 =====
let confettiInterval;
function startConfetti() {
  const canvas = document.getElementById('confettiCanvas');
  canvas.classList.add('active');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const colors = ['#d4af37','#f5d06b','#fff8dc','#ffd700','#fffacd','#c9950a'];
  const particles = Array.from({length:100}, () => ({
    x: Math.random()*canvas.width, y: -10,
    r: Math.random()*5+2,
    color: colors[Math.floor(Math.random()*colors.length)],
    speed: Math.random()*4+2, swing: Math.random()*3-1.5, rot: Math.random()*360
  }));
  confettiInterval = setInterval(() => {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p => {
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle = p.color; ctx.fillRect(-p.r, -p.r/2, p.r*2, p.r); ctx.restore();
      p.y += p.speed; p.x += p.swing; p.rot += 3;
      if (p.y > canvas.height) { p.y = -10; p.x = Math.random()*canvas.width; }
    });
  }, 16);
  setTimeout(stopConfetti, 4000);
}

function stopConfetti() {
  clearInterval(confettiInterval);
  const canvas = document.getElementById('confettiCanvas');
  canvas.classList.remove('active');
  canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
}

initLiff();
</script>
